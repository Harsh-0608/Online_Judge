<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Main Indigo-Purple Gradient -->
    <linearGradient id="plex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Accent Teal-Blue Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Drop Shadow / Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Stylized Coding & Network Node Logo -->
  <g opacity="0.95" filter="url(#glow)">
    <!-- Left Angle Bracket (<) -->
    <path d="M 170 140 L 50 256 L 170 372" stroke="url(#plex-grad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Right Angle Bracket (>) -->
    <path d="M 342 140 L 462 256 L 342 372" stroke="url(#plex-grad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Center Plex (Network Node Hub) -->
    <circle cx="256" cy="256" r="54" fill="url(#accent-grad)" />
    
    <!-- Connection lines connecting nodes -->
    <line x1="140" y1="256" x2="210" y2="256" stroke="url(#accent-grad)" stroke-width="18" stroke-linecap="round" />
    <line x1="372" y1="256" x2="302" y2="256" stroke="url(#accent-grad)" stroke-width="18" stroke-linecap="round" />
    <line x1="256" y1="140" x2="256" y2="206" stroke="url(#accent-grad)" stroke-width="18" stroke-linecap="round" />
    <line x1="256" y1="372" x2="256" y2="306" stroke="url(#accent-grad)" stroke-width="18" stroke-linecap="round" />
    
    <!-- Outer orbiting micro-nodes -->
    <circle cx="256" cy="110" r="24" fill="url(#plex-grad)" />
    <circle cx="256" cy="402" r="24" fill="url(#plex-grad)" />
  </g>
</svg>