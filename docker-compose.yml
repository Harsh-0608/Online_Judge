version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: codeplex-db
    restart: always
    ports:
      - "27017:27017" # Optional: kept open for admin/local debugging, but not needed if docker network is secured
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeplex-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/online-judge
      - JWT_SECRET=supersecretjwtkey123!@#
      - JWT_EXPIRES_IN=7d
      - XAI_API_KEY=${XAI_API_KEY}
      - XAI_MODEL=${XAI_MODEL}
    ports:
      - "5000:5000" # Expose for direct API testing if needed, though traffic routes through frontend proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeplex-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
